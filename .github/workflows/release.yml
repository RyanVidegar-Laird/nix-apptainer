name: Release
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - arch: x86_64-linux
            runner: ubuntu-latest
          - arch: aarch64-linux
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main

      - name: Validate version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          FLAKE_VERSION=$(grep 'version = "' flake.nix | head -1 | sed 's/.*version = "//;s/".*//')
          CARGO_VERSION=$(grep '^version = "' cli/Cargo.toml | sed 's/version = "//;s/".*//')
          echo "Tag: $TAG_VERSION  Flake: $FLAKE_VERSION  Cargo: $CARGO_VERSION"
          if [ "$TAG_VERSION" != "$FLAKE_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match flake.nix ($FLAKE_VERSION)"
            exit 1
          fi
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match Cargo.toml ($CARGO_VERSION)"
            exit 1
          fi

      - name: Build CLI
        run: nix build .#cli -o cli-result

      - name: Build SIF
        run: nix build -o sif-result

      - name: Sign release artifacts
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
        run: |
          nix develop --command bash scripts/sign-release.sh \
            --arch ${{ matrix.arch }} \
            --cli cli-result/bin/nix-apptainer \
            --sif sif-result \
            --output-dir .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.arch }}
          path: |
            nix-apptainer-${{ matrix.arch }}
            nix-apptainer-${{ matrix.arch }}.sig
            base-nixos-${{ matrix.arch }}.sif
            SHA256SUMS
            SHA256SUMS.sig
            signing-key.asc

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename per-arch checksums
        run: |
          for dir in artifacts/release-*; do
            arch="${dir#artifacts/release-}"
            mv "$dir/SHA256SUMS" "$dir/SHA256SUMS-${arch}"
            mv "$dir/SHA256SUMS.sig" "$dir/SHA256SUMS-${arch}.sig"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/release-*/nix-apptainer-*
            artifacts/release-*/base-nixos-*.sif
            artifacts/release-*/SHA256SUMS-*
            artifacts/release-*/signing-key.asc
