name: Nix Flake Check
on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    strategy:
      matrix:
        include:
          - arch: x86_64-linux
            runner: ubuntu-latest
          - arch: aarch64-linux
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - run: nix flake check --print-build-logs
      - name: Build CLI
        run: nix build .#cli -o cli-result
      - name: CLI smoke test
        run: cli-result/bin/nix-apptainer --help
      - name: CLI tests and clippy
        run: nix develop --command bash -c "cd cli && cargo test && cargo clippy -- -D warnings"
