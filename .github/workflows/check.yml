name: Nix Flake Check
on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - run: nix flake check --print-build-logs
      - name: Build CLI
        run: nix build .#cli -o cli-result
      - name: CLI smoke test
        run: cli-result/bin/nix-apptainer --help
      - name: CLI tests and clippy
        run: nix develop --command bash -c "cd cli && cargo test && cargo clippy -- -D warnings"
